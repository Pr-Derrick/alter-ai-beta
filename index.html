<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alter AI | 认知韧性之镜</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --card-bg: rgba(30, 33, 48, 0.7);
            --accent: #6c8ef5;
            --text-main: #e8eaf6;
            --text-dim: #9da3c8;
            --warning: #facc15;
            --danger: #ef4444;
            --sidebar-w: 260px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ══════════════════ 侧边栏 (PC端显示) ══════════════════ */
        aside {
            width: var(--sidebar-w);
            background: rgba(15, 17, 23, 0.95);
            border-right: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            padding: 20px;
            z-index: 100;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            color: var(--text-dim);
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .step-dot { width: 8px; height: 8px; border-radius: 50%; background: #334155; }
        .active .step-dot { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .done .step-dot { background: #10b981; }

        /* ══════════════════ 主对话区 ══════════════════ */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            padding: 20px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .ai { background: var(--card-bg); border-top-left-radius: 4px; backdrop-filter: blur(10px); }
        .user { background: var(--accent); align-self: flex-end; border-top-right-radius: 4px; }

        /* ══════════════════ 卡片组件 ══════════════════ */
        .safety-card {
            background: rgba(250, 204, 21, 0.1);
            border: 1px solid var(--warning);
            padding: 20px;
            border-radius: 12px;
            margin: 10px 0;
            animation: slideIn 0.4s ease;
        }

        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        button {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-confirm { background: var(--accent); color: white; }
        .btn-ghost { background: transparent; border: 1px solid #475569; color: var(--text-dim); }

        /* ══════════════════ 输入区 ══════════════════ */
        .input-area {
            padding: 20px;
            background: rgba(15, 17, 23, 0.8);
            display: flex;
            gap: 12px;
        }

        input {
            flex: 1;
            background: #1e2130;
            border: 1px solid #334155;
            padding: 12px 16px;
            border-radius: 10px;
            color: white;
            outline: none;
        }

        /* ══════════════════ 手机端适配 (V3.0) ══════════════════ */
        @media screen and (max-width: 768px) {
            /* 1. 强制纵向堆叠布局，防止水平挤压 */
            body {
                flex-direction: column;
                height: 100dvh;
                overflow: hidden;
            }

            /* 2. 彻底隐藏侧边栏 */
            aside { display: none !important; }

            /* 3. 主区域占满全部屏幕宽度和剩余高度 */
            main {
                width: 100%;
                flex: 1;
                min-width: 0;
                overflow: hidden;
            }

            /* 4. 释放聊天宽度 */
            .chat-container {
                width: 100%;
                padding: 12px 8px;
                gap: 12px;
                box-sizing: border-box;
            }

            /* 5. 修复气泡宽度，防止"面条"效果 */
            .bubble {
                max-width: 95%;
                font-size: 1rem;
                word-break: break-word;
                overflow-wrap: break-word;
                white-space: pre-wrap;
            }

            /* AI 气泡靠左展开，紧贴宽度上限 */
            .bubble.ai {
                width: fit-content;
                max-width: 95%;
            }

            /* 用户气泡靠右 */
            .bubble.user {
                width: fit-content;
                max-width: 95%;
            }

            /* 6. 输入区横跨全屏底端，Send:Input = 2:8 */
            .input-area {
                width: 100%;
                padding: 10px 8px 20px;
                gap: 8px;
                box-sizing: border-box;
                background: rgba(15, 17, 23, 0.95);
            }

            input {
                flex: 8;
                font-size: 16px; /* 防止 iOS 自动缩放 */
                min-width: 0;
            }

            .input-area button.btn-confirm {
                flex: 2;
                min-width: 0;
                padding: 12px 4px;
                white-space: nowrap;
            }

            /* 7. Header 压缩 */
            header {
                padding: 12px 16px;
            }

            header h1 { font-size: 1.1rem; }

            .export-btn-container { position: fixed; top: 15px; right: 15px; z-index: 200; }
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 硬护栏冻结样式 */
        .hard-frozen { filter: grayscale(1) blur(2px); pointer-events: none; }
        #hard-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="hard-overlay">
        <h1 style="color:var(--danger)">🚨 触发硬安全护栏</h1>
        <p>我们检测到您的表达可能涉及紧急风险。请联系专业支持：</p>
        <div style="font-size: 2rem; margin: 20px 0;">988 (心理危机热线)</div>
        <button onclick="location.reload()" class="btn-confirm">刷新重置</button>
    </div>

    <aside id="side-menu">
        <h2 style="font-family:'Space Grotesk'">Alter AI</h2>
        <div class="step-item active" id="step-1"><div class="step-dot"></div> Routing</div>
        <div class="step-item" id="step-2"><div class="step-dot"></div> Calibration</div>
        <div class="step-item" id="step-3"><div class="step-dot"></div> Slot Filling</div>
        <div class="step-item" id="step-4"><div class="step-dot"></div> Drafting</div>
        <div class="step-item" id="step-5"><div class="step-dot"></div> Commit</div>
        
        <div style="margin-top:auto">
            <div id="mem-count" style="font-size: 0.8rem; color: var(--accent);">已存记忆: 0</div>
            <button onclick="exportMemory()" class="btn-ghost" style="width:100%; margin-top:10px; font-size:0.8rem">⬇️ 导出记忆档案</button>
        </div>
    </aside>

    <main id="main-content">
        <header>
            <div>
                <h1 style="margin:0; font-size:1.2rem">认知重构之镜</h1>
                <span style="font-size:0.7rem; color:var(--text-dim)">🔒 本地加密模式 · 匿名同步</span>
            </div>
            <div class="export-btn-container PC-hidden">
                <button onclick="exportMemory()" class="btn-ghost" style="padding:5px 10px; font-size:0.7rem">导出</button>
            </div>
        </header>

        <div class="chat-container" id="chat-box">
            <div class="bubble ai">你好。我是 Alter AI。现在感到很有压力吗？我们可以聊聊，或者直接开始 [认知重构]。</div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="输入你的感受..." onkeypress="if(event.key==='Enter') send()">
            <button onclick="send()" class="btn-confirm">发送</button>
        </div>
    </main>

    <script>
        let currentStep = 1;
        let memory = JSON.parse(localStorage.getItem('alter_ai_memory') || '[]');
        const WEBHOOK_URL = "https://formspree.io/f/xeepgjbv";

        function updateUI() {
            document.getElementById('mem-count').innerText = `已存记忆: ${memory.length}`;
        }

        function addMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `bubble ${role}`;
            div.innerText = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
            return div;
        }

        async function send() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;

            addMsg('user', text);
            input.value = '';

            // 1. 硬护栏检测
            const hardTriggers = ["suicide", "kill myself", "end it all"];
            if (hardTriggers.some(t => text.toLowerCase().includes(t))) {
                triggerHardGuardrail();
                return;
            }

            // 2. 软护栏检测
            const softTriggers = ["killing me", "can't take it", "完蛋了"];
            if (softTriggers.some(t => text.toLowerCase().includes(t))) {
                showSoftGuardrail(text);
                return;
            }

            // 模拟逻辑推进
            setTimeout(() => {
                if (currentStep < 4) {
                    currentStep++;
                    updateStepUI();
                    addMsg('ai', "明白了。在这个情境下，你最担心发生什么？");
                } else {
                    showDraft(text);
                }
            }, 800);
        }

        function showSoftGuardrail(input) {
            const div = document.createElement('div');
            div.className = 'safety-card';
            div.innerHTML = `
                <div style="color:var(--warning); font-weight:600">⚠️ 情绪校准确认</div>
                <p style="font-size:0.85rem">你提到了 "${input}"。这是一个比喻，还是你感到极其不安全？</p>
                <div class="btn-group">
                    <button class="btn-confirm" onclick="resolveSoft(true, this)">只是发泄，我很安全</button>
                    <button class="btn-ghost" onclick="resolveSoft(false, this)">我需要支持</button>
                </div>
            `;
            document.getElementById('chat-box').appendChild(div);
        }

        function resolveSoft(safe, btn) {
            btn.parentElement.parentElement.remove();
            if (safe) {
                addMsg('ai', "收到。那我们继续倾诉，我会降低挑战强度。");
            } else {
                triggerHardGuardrail();
            }
        }

        function triggerHardGuardrail() {
            document.getElementById('main-content').classList.add('hard-frozen');
            document.getElementById('side-menu').classList.add('hard-frozen');
            document.getElementById('hard-overlay').style.display = 'flex';
        }

        function showDraft(text) {
            const div = document.createElement('div');
            div.className = 'bubble ai';
            div.style.border = "1px solid var(--accent)";
            div.innerHTML = `
                <div style="color:var(--accent); font-size:0.7rem; margin-bottom:5px">REFLECTIVE DRAFT</div>
                引用你 Jan 20 的成功经验，这件事是否真的无可挽回？
                <div class="btn-group">
                    <button class="btn-confirm" onclick="commit(this)">Reflect on this</button>
                </div>
            `;
            document.getElementById('chat-box').appendChild(div);
        }

        async function commit(btn) {
            btn.disabled = true;
            btn.innerText = "Saving...";

            const entry = {
                id: Date.now(),
                context: "内测反馈",
                timestamp: new Date().toISOString(),
                verified: true
            };

            // 本地保存
            memory.push(entry);
            localStorage.setItem('alter_ai_memory', JSON.stringify(memory));
            updateUI();

            // 云端静默同步 (Formspree)
            fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify(entry)
            }).then(() => console.log("✓ Synced")).catch(e => console.error(e));

            setTimeout(() => {
                btn.parentElement.parentElement.innerHTML = "✓ 认知已存档。你的韧性增加了。";
                currentStep = 5;
                updateStepUI();
            }, 800);
        }

        function updateStepUI() {
            for(let i=1; i<=5; i++) {
                const el = document.getElementById(`step-${i}`);
                el.className = `step-item ${i === currentStep ? 'active' : (i < currentStep ? 'done' : '')}`;
            }
        }

        function exportMemory() {
            const blob = new Blob([JSON.stringify(memory, null, 2)], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `AlterAI_Memory_${new Date().toLocaleDateString()}.txt`;
            a.click();
        }

        updateUI();
    </script>
</body>
</html>
