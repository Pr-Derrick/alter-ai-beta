<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alter Ai - V2.3 Beta (Cloud Sync)</title>
  <style>
    /* ── Reset & Base ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-dark:       #0f1117;
      --bg-panel:      #1a1d27;
      --bg-sidebar:    #14172050;
      --bg-input:      #1e2130;
      --accent:        #6c8ef5;
      --accent-soft:   #3b4fa8;
      --accent-glow:   rgba(108, 142, 245, 0.18);
      --text-primary:  #e8eaf6;
      --text-secondary:#9da3c8;
      --border:        #2a2e45;
      --bubble-bot:    #1e2438;
      --bubble-user:   #2a3260;
      --danger:        #e53935;
      --danger-glow:   rgba(229, 57, 53, 0.3);
      --success:       #43a047;
      --radius:        12px;
      --sidebar-w:     300px;
      --transition:    0.2s ease;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── UI Components ───────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--bg-panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      z-index: 10;
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .tagline {
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .beta-badge {
      font-size: 0.65rem;
      background: rgba(108, 142, 245, 0.25);
      color: var(--accent);
      padding: 3px 8px;
      border-radius: 4px;
      border: 1px solid var(--accent-soft);
      margin-left: 8px;
    }

    /* 隐私提示条 */
    .privacy-notice {
      background: rgba(108, 142, 245, 0.1);
      border-bottom: 1px solid var(--border);
      padding: 6px 24px;
      font-size: 0.75rem;
      color: var(--text-secondary);
      text-align: center;
    }

    .layout { display: flex; flex: 1; overflow: hidden; }

    aside {
      width: var(--sidebar-w);
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 24px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    /* V2.1 Onboarding Cards */
    .onboarding-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 15px;
      width: 100%;
    }
    .onboarding-card {
      background: var(--bg-input);
      border: 1px solid var(--border);
      padding: 14px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all var(--transition);
      text-align: left;
    }
    .onboarding-card:hover {
      border-color: var(--accent);
      background: var(--accent-glow);
      transform: translateX(5px);
    }
    .onboarding-card .card-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      margin-bottom: 4px;
      display: block;
    }
    .onboarding-card .card-desc {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
    }

    /* Existing V2 Styles Integrated */
    .section-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 10px; }
    .persona-btn { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-secondary); border-radius: var(--radius); padding: 10px 14px; font-size: 0.88rem; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; margin-bottom: 8px; }
    .persona-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .profile-entry { background: var(--bg-input); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 10px 12px; font-size: 0.82rem; margin-bottom: 10px; }
    .profile-entry.highlight { border-left-color: var(--success); background: rgba(67, 160, 71, 0.08); }

    .chat-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
    .chat-history { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .message { display: flex; flex-direction: column; max-width: 80%; animation: fadeUp 0.3s ease; }
    .message.bot { align-self: flex-start; }
    .message.user { align-self: flex-end; }
    .bubble { padding: 12px 16px; border-radius: var(--radius); font-size: 0.9rem; line-height: 1.6; background: var(--bubble-bot); border: 1px solid var(--border); }
    .message.user .bubble { background: var(--bubble-user); border-color: var(--accent-soft); }
    .sender { font-size: 0.75rem; color: var(--text-secondary); margin-bottom: 4px; opacity: 0.7; }

    .draft-card { background: rgba(108, 142, 245, 0.08); border: 1px solid var(--accent); border-radius: var(--radius); padding: 18px; backdrop-filter: blur(8px); }
    .card-actions { display: flex; gap: 10px; margin-top: 15px; }
    .card-actions button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--accent-soft); background: var(--bg-input); color: white; cursor: pointer; transition: all var(--transition); }
    .card-actions button:hover { background: var(--accent-glow); border-color: var(--accent); }

    /* Soft guardrail calibration card */
    .safety-card { background: rgba(229, 57, 53, 0.08); border: 1px solid rgba(229, 57, 53, 0.55); border-radius: var(--radius); padding: 18px; backdrop-filter: blur(8px); }
    .safety-title { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(229, 57, 53, 0.95); font-weight: 800; margin-bottom: 6px; }
    .safety-desc { font-size: 0.88rem; color: var(--text-primary); line-height: 1.5; }
    .safety-actions { display: flex; gap: 10px; margin-top: 14px; }
    .safety-actions button { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid rgba(229, 57, 53, 0.35); background: rgba(30, 33, 48, 0.9); color: white; cursor: pointer; transition: all var(--transition); }
    .safety-actions button:hover { border-color: rgba(229, 57, 53, 0.75); box-shadow: 0 0 18px rgba(229, 57, 53, 0.08); }
    .safety-actions .primary { background: rgba(229, 57, 53, 0.18); border-color: rgba(229, 57, 53, 0.6); }

    /* Hard guardrail banner */
    .hard-banner {
      background: linear-gradient(90deg, rgba(229,57,53,0.35), rgba(229,57,53,0.08));
      border: 1px solid rgba(229,57,53,0.65);
      box-shadow: 0 0 30px rgba(229,57,53,0.15);
      padding: 12px 14px;
      border-radius: 12px;
      margin: 16px 20px 0 20px;
      color: var(--text-primary);
      font-size: 0.9rem;
    }
    .hard-banner strong { color: rgba(255,255,255,0.95); }

    .input-area { padding: 16px 20px; background: var(--bg-panel); border-top: 1px solid var(--border); display: flex; gap: 10px; }
    #chat-input { flex: 1; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius); color: white; padding: 12px; outline: none; resize: none; font-family: inherit; }
    #send-btn { background: var(--accent); border: none; padding: 0 20px; border-radius: var(--radius); color: white; cursor: pointer; transition: all var(--transition); }
    #send-btn:hover { background: #7a9af7; }
    #send-btn:disabled, #chat-input:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Typing dots */
    .typing { display: flex; gap: 4px; padding: 10px; }
    .typing span { width: 6px; height: 6px; background: var(--text-secondary); border-radius: 50%; animation: blink 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .step-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); margin-right: 10px; }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
    .step-dot.done { background: var(--success); }
    .step-dot.risk { background: var(--danger); box-shadow: 0 0 10px var(--danger-glow); }
    .step-row { display: flex; align-items: center; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 8px; }

    /* Export Memory Button - Glassmorphism Style */
    .export-btn-container {
      position: fixed;
      bottom: 80px;
      left: 16px;
      z-index: 100;
    }

    .export-btn {
      background: rgba(20, 23, 32, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all var(--transition);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .export-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(108, 142, 245, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(108, 142, 245, 0.15);
    }

    .export-btn svg {
      width: 16px;
      height: 16px;
      fill: currentColor;
    }

    /* Memory count indicator */
    .memory-count {
      font-size: 0.7rem;
      background: rgba(108, 142, 245, 0.2);
      color: var(--accent);
      padding: 2px 6px;
      border-radius: 10px;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<header>
  <div class="logo-icon">🪞</div>
  <h1>Alter Ai</h1>
  <span class="beta-badge">V2.3 BETA</span>
  <span class="tagline">Cloud Sync Enabled</span>
</header>

<!-- 隐私提示条 -->
<div class="privacy-notice">
  ☁️ 研究模式：点击"Reflect on this"后，对话摘要将上传至开发者数据库用于课程分析
</div>

<div class="layout">
  <aside>
    <div>
      <p class="section-title">Persona</p>
      <div id="persona-list">
        <button class="persona-btn" data-persona="mirror">🪞 Alter Ai — The Mirror</button>
        <button class="persona-btn" data-persona="listener">👂 The Listener</button>
        <button class="persona-btn" data-persona="coach">🎯 The Coach</button>
      </div>
    </div>
    <div>
      <p class="section-title">History</p>
      <div class="profile-entry" id="entry-jan">
        <span style="color:var(--accent); font-size:0.7rem; font-weight:bold;">JAN 20</span><br>
        Refactored legacy code under pressure.
      </div>
    </div>
    <div>
      <p class="section-title">Interaction Funnel</p>
      <div id="funnel">
        <div class="step-row"><div class="step-dot active" id="dot-0"></div>Routing</div>
        <div class="step-row"><div class="step-dot" id="dot-1"></div>Calibration</div>
        <div class="step-row"><div class="step-dot" id="dot-2"></div>Slot Filling</div>
        <div class="step-row"><div class="step-dot" id="dot-3"></div>Drafting</div>
        <div class="step-row"><div class="step-dot" id="dot-4"></div>Commit</div>
      </div>
    </div>
  </aside>

  <main class="chat-panel">
    <div id="hard-guardrail" style="display:none;"></div>
    <div class="chat-history" id="chat-history"></div>
    <div class="input-area">
      <textarea id="chat-input" placeholder="Select a mode above to start..." rows="1" disabled></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
  </main>
</div>

<!-- Export Memory Button -->
<div class="export-btn-container">
  <button class="export-btn" onclick="exportMemory()" title="Export all memories to .txt file">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
    </svg>
    导出记忆
    <span class="memory-count" id="memory-count">0</span>
  </button>
</div>

<script>
  // ═══════════════════════════════════════════════════════════════════════
  // ALTER AI V2.3 - CLOUD SYNC SYSTEM (Formspree Integration)
  // ═══════════════════════════════════════════════════════════════════════

  const STORAGE_KEY = 'alter_ai_memory';
  const FORMSPREE_ENDPOINT = "https://formspree.io/f/xeepgjbv";

  // Memory data structure: { context, trigger, strategy, date, verified: true }
  let memoryStore = [];

  // Load existing memories from localStorage
  function loadMemory() {
    try {
      const stored = localStorage.getItem(STORAGE_KEY);
      if (stored) {
        memoryStore = JSON.parse(stored);
        updateMemoryCount();
      }
    } catch (e) {
      console.error('Failed to load memory:', e);
      memoryStore = [];
    }
  }

  // Save memory to localStorage
  function saveMemory(data) {
    try {
      memoryStore.push(data);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(memoryStore));
      updateMemoryCount();
    } catch (e) {
      console.error('Failed to save memory:', e);
    }
  }

  // Update memory count display
  function updateMemoryCount() {
    const countEl = document.getElementById('memory-count');
    if (countEl) {
      countEl.textContent = memoryStore.length;
    }
  }

  // Export memory to .txt file
  function exportMemory() {
    if (memoryStore.length === 0) {
      alert('No memories to export yet. Have a conversation and click "Reflect on this" to save memories.');
      return;
    }

    const timestamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
    let content = `═══════════════════════════════════════════════════════════════\n`;
    content += `                    ALTER AI MEMORY EXPORT\n`;
    content += `                    Version: V2.3 Beta\n`;
    content += `                    Exported: ${new Date().toLocaleString()}\n`;
    content += `═══════════════════════════════════════════════════════════════\n\n`;

    memoryStore.forEach((memory, index) => {
      content += `[Memory #${index + 1}]\n`;
      content += `Date: ${memory.date}\n`;
      content += `Context: ${memory.context}\n`;
      content += `Trigger: ${memory.trigger}\n`;
      content += `Strategy: ${memory.strategy}\n`;
      content += `Verified: ${memory.verified}\n`;
      content += `─────────────────────────────────────────────────────────────\n\n`;
    });

    content += `Total Memories: ${memoryStore.length}\n`;
    content += `═══════════════════════════════════════════════════════════════\n`;

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `alter_ai_memory_${timestamp}.txt`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Funnel indices (sidebar)
  // 0 Routing -> 1 Calibration -> 2 Slot Filling -> 3 Drafting -> 4 Commit

  let chatStep = 0;
  let activePersona = null;
  let hardGuardrailActive = false;
  let currentContext = '';
  let currentTrigger = '';

  const history = document.getElementById('chat-history');
  const input = document.getElementById('chat-input');
  const sendBtn = document.getElementById('send-btn');
  const hardEl = document.getElementById('hard-guardrail');

  function addMsg(role, content, isHTML = false) {
    const m = document.createElement('div');
    m.className = `message ${role}`;
    m.innerHTML = `<div class="sender">${role === 'bot' ? 'Alter Ai' : 'You'}</div><div class="bubble">${isHTML ? content : escapeHtml(content)}</div>`;
    history.appendChild(m);
    history.scrollTop = history.scrollHeight;
    return m.querySelector('.bubble');
  }

  function typeWriter(el, text, cb) {
    let i = 0;
    el.textContent = '';
    (function type() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
        setTimeout(type, 30);
      } else if (cb) cb();
    })();
  }

  function showTyping(cb) {
    const t = document.createElement('div');
    t.className = 'message bot';
    t.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
    history.appendChild(t);
    setTimeout(() => { t.remove(); cb(); }, 1000);
  }

  function setPersona(persona) {
    activePersona = persona;
    document.querySelectorAll('.persona-btn').forEach(b => b.classList.toggle('active', b.dataset.persona === persona));
  }

  function freezeUI(on) {
    hardGuardrailActive = on;
    input.disabled = on;
    sendBtn.disabled = on;
  }

  function triggerHardGuardrail(reasonText = "") {
    // Hard guardrail = red banner + freeze UI
    updateDots(1, { risk: true });
    freezeUI(true);

    hardEl.style.display = 'block';
    hardEl.className = 'hard-banner';
    hardEl.innerHTML = `<strong>Safety check:</strong> I'm worried you may be in immediate danger. ${reasonText ? `<span style="color:rgba(255,255,255,0.9)">${reasonText}</span>` : ''}<br><span style="color:rgba(255,255,255,0.9)">If you are in the U.S., call or text <strong>988</strong> (Suicide & Crisis Lifeline). If you're in immediate danger, call <strong>911</strong>.</span>`;

    showTyping(() => {
      addMsg('bot', "I can't continue the coaching flow while this is unclear. If you're not in immediate danger, tell me you're safe so we can continue.");
    });
  }

  function isBorderline(text) {
    const t = text.toLowerCase();
    const patterns = [
      /\bkilling me\b/i,
      /\bcan\s*'?t\s*take\s*it\b/i,
      /\bend of the world\b/i,
      /\bi\s*can\s*'?t\s*do\s*this\b/i,
      /\bi\s*'?m\s*done\b/i
    ];
    return patterns.some(p => p.test(t));
  }

  function showSafetyCalibrationCard(triggerText) {
    // Soft guardrail: do NOT freeze UI; ask for clarification with a card
    updateDots(1);

    showTyping(() => {
      const card = `
        <div class="safety-card">
          <div class="safety-title">SAFETY CALIBRATION</div>
          <p class="safety-desc">I noticed phrasing that could mean distress (e.g., <span style="color:rgba(255,255,255,0.9); font-style:italic;">"${escapeHtml(triggerText)}"</span>). Before we continue, which one fits best?</p>
          <div class="safety-actions">
            <button onclick="calibrationChoice(true)">I am safe, just venting</button>
            <button class="primary" onclick="calibrationChoice(false)">I need support</button>
          </div>
        </div>`;
      addMsg('bot', card, true);
    });
  }

  function escapeHtml(str) {
    return (str || "")
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#39;');
  }

  window.calibrationChoice = (safe) => {
    if (hardGuardrailActive) return;

    addMsg('user', safe ? "I am safe, just venting" : "I need support");

    if (safe) {
      // Route back to Listener mode
      setPersona('listener');
      updateDots(2);
      showTyping(() => {
        addMsg('bot', "Thanks for clarifying. I'll stay in Listener mode. Tell me what's been piling up—no fixing, just space.");
      });
      return;
    }

    triggerHardGuardrail("If you're feeling unsafe, you deserve real-time help.");
  };

  // V2.1 Initial Routing Path Selection
  window.selectPath = function(persona, text) {
    if (hardGuardrailActive) return;

    setPersona(persona);
    addMsg('user', text);
    input.disabled = false; sendBtn.disabled = false;
    input.placeholder = "Tell me more about what happened...";

    // Store context for memory
    currentContext = text;

    showTyping(() => {
      chatStep = 1;
      updateDots(2);
      addMsg('bot', `Mode <b>${persona.toUpperCase()}</b> engaged. To mirror this accurately, what was the <b>exact moment</b> your mood shifted today?`, true);
    });
  };

  function updateDots(activeIndex, opts = {}) {
    const max = 4;
    for (let i = 0; i <= max; i++) {
      const d = document.getElementById(`dot-${i}`);
      if (!d) continue;

      if (i < activeIndex) d.className = 'step-dot done';
      else if (i === activeIndex) d.className = opts.risk ? 'step-dot risk' : 'step-dot active';
      else d.className = 'step-dot';
    }
  }

  function continueMainFlow() {
    chatStep++;

    // With new funnel, Slot Filling aligns with dot-2 and original chatStep==2 behavior
    if (chatStep === 2) {
      updateDots(3);
      document.getElementById('entry-jan').classList.add('highlight');
      showTyping(() => {
        const card = `
          <div class="draft-card">
            <p style="font-size:0.7rem; color:var(--accent); font-weight:bold; margin-bottom:5px;">REFLECTIVE DRAFT</p>
            <p>"In your Jan 20 record, you mastered a legacy refactor under pressure. Is today's obstacle fundamentally different, or are you just using a different lens?"</p>
            <div class="card-actions">
              <button onclick="commit(true)">Reflect on this</button>
              <button onclick="commit(false)" style="opacity:0.6;">This doesn't apply</button>
            </div>
          </div>`;
        addMsg('bot', card, true);
      });
    }
  }

  sendBtn.onclick = () => {
    if (hardGuardrailActive) return;

    const val = input.value.trim();
    if (!val) return;

    addMsg('user', val);
    input.value = '';

    // Store trigger for memory
    currentTrigger = val;

    // Soft guardrail between Routing and Hard Guardrail
    // Only probe in early stages (before drafting/commit) and when the phrase is borderline.
    if (chatStep <= 1 && isBorderline(val)) {
      showSafetyCalibrationCard(val);
      return;
    }

    continueMainFlow();
  };

  window.commit = (ok) => {
    if (hardGuardrailActive) return;

    addMsg('user', ok ? "Reflect on this" : "This doesn't apply");

    if (ok) {
      // Save memory when user clicks "Reflect on this"
      const memoryData = {
        context: currentContext || 'General reflection',
        trigger: currentTrigger || 'User initiated reflection',
        strategy: activePersona || 'mirror',
        date: new Date().toISOString(),
        verified: true
      };
      saveMemory(memoryData);

      // ═════════════════════════════════════════════════════════════════
      // FORM 同步到 Formspree 云端数据库
      // ═════════════════════════════════════════════════════════════════
      fetch(FORMSPREE_ENDPOINT, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Accept": "application/json"
        },
        body: JSON.stringify({
          context: currentContext || 'General reflection',
          trigger: currentTrigger || 'User input',
          strategy: activePersona || 'mirror',
          timestamp: new Date().toISOString(),
          userAgent: navigator.userAgent,
          _gotcha: ""  // 防垃圾邮件
        })
      }).then(response => {
        if (response.ok) {
          console.log("✓ Data synced to Formspree cloud");
        }
      }).catch(error => {
        console.error("Sync failed:", error);
      });
      // ═════════════════════════════════════════════════════════════════

      updateDots(4);
      showTyping(() => {
        addMsg('bot', "Perspective anchored. I've updated your resilience profile with this new insight.");
      });
    } else {
      showTyping(() => {
        addMsg('bot', "Understood. Let's drop the coaching and just focus on what you're feeling now. I'm listening.");
      });
    }
  };

  window.onload = () => {
    // Load existing memories
    loadMemory();

    showTyping(() => {
      const b = addMsg('bot', "");
      typeWriter(b, "I am Alter Ai. To mirror you accurately, how should we approach your thoughts today?", () => {
        const cards = `
          <div class="onboarding-container">
            <div class="onboarding-card" onclick="selectPath('coach', 'I need a perspective shift.')">
              <span class="card-title">Challenge & Reframe</span>
              <span class="card-desc">Use Socratic questioning to challenge my negative rumination.</span>
            </div>
            <div class="onboarding-card" onclick="selectPath('listener', 'I just need to vent.')">
              <span class="card-title">Empathetic Listening</span>
              <span class="card-desc">I need a safe space to dump my emotions without intervention.</span>
            </div>
          </div>`;
        addMsg('bot', cards, true);
      });
    });
  };
</script>
</body>
